<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Astro Gaming Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-page">

  <!-- Theme toggle top-right -->
  <div class="login-theme-toggle" onclick="toggleTheme()">
    <span id="theme-icon">☀️</span>
    <div class="toggle-track"><div class="toggle-thumb"></div></div>
    <span id="theme-label">Light</span>
  </div>

  <div class="login-outer">
    <!-- Header above the card -->
    <div class="login-header">
      <h1 class="login-app-title">Astro Gaming Store</h1>
      <p class="login-app-sub">Web based Inventory Management System</p>
    </div>

    <!-- Card -->
    <div class="login-card-wrap">
      <div class="login-card">
        <h2 class="login-card-title">Sign In</h2>

        {% if error %}
          <div class="alert alert-danger py-2 mb-3">
            <i class="bi bi-exclamation-triangle-fill me-1"></i>{{ error }}
          </div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}" autocomplete="off">
          <div class="login-field">
            <label class="login-label">Username</label>
            <input type="text" name="username" class="login-input"
                   value="{{ request.form.get('username','') }}" autofocus/>
          </div>
          <div class="login-field">
            <label class="login-label">Password</label>
            <input type="password" name="password" class="login-input"/>
          </div>
          <div class="login-check">
            <input type="checkbox" id="remember" class="login-checkbox"/>
            <label for="remember" class="login-check-label">Keep me signed in</label>
          </div>
          <button type="submit" class="login-btn">Sign In →</button>
        </form>

        <p class="login-hint">Access level: Admin · Cashier</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
